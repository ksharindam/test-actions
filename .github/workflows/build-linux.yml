name: Build Packages

on:
  push:
  release:
    types: [published]

# required for uploading assets
permissions:
  contents: write

jobs:
  AppImage:
    strategy:
      fail-fast: false
      matrix:
        include:
          - ARCH: x86_64
            RUNS_ON: ubuntu-latest
          #- ARCH: aarch64
          #  RUNS_ON: ubuntu-24.04-arm

    name: Build ${{ matrix.ARCH }}
    runs-on: ${{ matrix.RUNS_ON }}
    env:
      ARCH: ${{ matrix.ARCH }}

    steps:
      - uses: actions/checkout@v3

      - name: Build AppImage
        run: |
          cd AppImage
          bash -ex build-in-docker.sh

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhotoQuick-AppImage
          path: "AppImage/PhotoQuick*.AppImage"
          retention-days: 2
